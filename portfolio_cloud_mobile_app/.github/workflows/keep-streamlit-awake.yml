name: Keep Streamlit app awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$STREAMLIT_APP_URL" ]; then
            echo "Set the STREAMLIT_APP_URL repository secret first."
            exit 1
          fi
          curl --fail --location --max-time 60 --retry 3 --retry-delay 10 "$STREAMLIT_APP_URL"
